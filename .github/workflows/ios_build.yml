name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        # Capacitor expects a web build in the 'out' or 'build' folder

      - name: Install Capacitor iOS
        run: |
          npm install @capacitor/ios
          npx cap add ios || true
          npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/App/build/Release-iphoneos/App.app build/Payload/
          cd build
          zip -r MovieBox.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox-IPA
          path: build/MovieBox.ipa
