name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        # Capacitor expects a web build in the 'out' or 'build' folder

      - name: Install Capacitor iOS
        run: |
          npm install @capacitor/ios
          # Initialize iOS platform if it doesn't exist
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/Payload
          # Find the .app file (the path can vary slightly)
          APP_PATH=$(find ios/App/build -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            # Try alternative location
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          fi
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r MovieBox.ipa Payload

          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox-IPA
          path: build/MovieBox.ipa
