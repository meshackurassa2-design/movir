name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        # Capacitor expects a web build in the 'out' or 'build' folder

      - name: Install Capacitor iOS
        run: |
          npm install @capacitor/ios @capacitor/cli
          # Initialize iOS platform
          npx cap add ios || echo "iOS already added"
          npx cap sync ios
          # Verify the workspace exists
          ls -R ios/App

      - name: Build iOS App
        run: |
          set -o pipefail
          cd ios/App
          if [ ! -d "App.xcodeproj" ]; then
            echo "Error: App.xcodeproj not found!"
            exit 1
          fi
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -derivedDataPath ../../build_output CODE_SIGNING_ALLOWED=NO | xcpretty


      - name: Create Unsigned IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build_output -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find App.app"
            exit 1
          fi
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r MovieBox.ipa Payload


          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieBox-IPA
          path: build/MovieBox.ipa
